<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown to Your Birthday!</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Comic Sans MS', cursive, sans-serif; }
body { background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; overflow: hidden; }
.container { text-align: center; z-index: 10; padding: 2rem; max-width: 800px; background-color: rgba(255,255,255,0.2); border-radius: 20px; backdrop-filter: blur(5px); box-shadow: 0 8px 32px rgba(255,105,180,0.3); }
h1 { color: #ff69b4; font-size: 2.5rem; text-shadow: rgb(255,255,255) 0px 0px 10px; margin-bottom: 1rem; }
p { color: #ff69b4; font-size: 1.2rem; margin-bottom: 2rem; }
.timer { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; }
.time-box { background: rgba(255,255,255,0.4); border-radius: 15px; padding: 1.5rem 2rem; min-width: 120px; }
.time-box span { display: block; font-size: 3rem; color: #ff69b4; font-weight: bold; }
.time-box label { color: #ff69b4; font-size: 1rem; }
.emoji { font-size: 3rem; margin: 1rem 0; }
</style>
</head>
<body>
<div class="container">
  <div class="emoji">🎂✨💕</div>
  <h1>Чиний төрсөн өдөр хүртэл...</h1>
  <p>My Cinderella-гийн онцгой өдөр ойртож байна!</p>
  <div class="timer">
    <div class="time-box"><span id="days">0</span><label>Өдөр</label></div>
    <div class="time-box"><span id="hours">0</span><label>Цаг</label></div>
    <div class="time-box"><span id="minutes">0</span><label>Минут</label></div>
    <div class="time-box"><span id="seconds">0</span><label>Секунд</label></div>
  </div>
  <div class="emoji" style="margin-top:2rem">🎈🎉🎀</div>
</div>
<script>
const birthday = new Date('2026-04-09T00:00:00');
function update() {
  const now = new Date();
  const diff = birthday - now;
  if (diff <= 0) { document.querySelector('h1').textContent = '🎉 Төрсөн өдрөөр чамд!'; return; }
  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const minutes = Math.floor((diff % 3600000) / 60000);
  const seconds = Math.floor((diff % 60000) / 1000);
  document.getElementById('days').textContent = days;
  document.getElementById('hours').textContent = hours;
  document.getElementById('minutes').textContent = minutes;
  document.getElementById('seconds').textContent = seconds;
}
update();
setInterval(update, 1000);
</script>
</body>
</html>
